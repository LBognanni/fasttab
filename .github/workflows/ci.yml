name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev \
            libxext-dev libxfixes-dev libgl1-mesa-dev \
            libxcb1-dev libxcb-composite0-dev libxcb-image0-dev libxcb-keysyms1-dev

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.0

      - name: Download dependencies
        run: chmod +x ./setup.sh && ./setup.sh

      - name: Run Tests
        run: zig build test

  release:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev \
            libxext-dev libxfixes-dev libgl1-mesa-dev \
            libxcb1-dev libxcb-composite0-dev libxcb-image0-dev libxcb-keysyms1-dev

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.0

      - name: Download dependencies
        run: chmod +x ./setup.sh && ./setup.sh

      - name: Build Release
        run: zig build -Doptimize=ReleaseSafe

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate Changelog
        id: generate_log
        run: |
          CHANGELOG=$(python .github/scripts/collate_commits.py)
          {
            echo 'changelog_content<<EOF'
            echo "$CHANGELOG"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.generate_log.outputs.changelog_content }}
          files: zig-out/bin/fasttab
